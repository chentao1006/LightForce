<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <img src="icon-48.png" alt="Light Force Logo" width="32" height="32">
        <div>
            <div class="title">Light Force</div>
            <div id="version" class="version"></div>
        </div>
    </div>
    <div class="content">
        <span>Force Light Theme</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider round"></span>
        </label>
    </div>
    <div class="content">
        <span>Only for day light</span>
        <label class="switch">
            <input type="checkbox" id="onlyDaylight">
            <span class="slider round"></span>
        </label>
    </div>
    <script src="popup.js"></script>
</body>

</html>
